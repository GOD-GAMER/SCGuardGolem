name: Release & Publish

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build --no-daemon

      - name: Upload JAR to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(ls build/libs/SecurityGolemAddon-*.jar | head -1)
          gh release upload "${{ github.event.release.tag_name }}" "$JAR" --clobber

      - name: Publish to CurseForge
        if: vars.CURSEFORGE_PROJECT_ID != '' && secrets.CURSEFORGE_TOKEN != ''
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: ./gradlew curseforge -PcurseforgeProjectId=${{ vars.CURSEFORGE_PROJECT_ID }} --no-daemon
