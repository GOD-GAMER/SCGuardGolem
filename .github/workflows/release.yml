name: Publish to CurseForge

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. mc1.21.10-v1.0.0)"
        required: true
        type: choice
        options:
          - mc26.1-v1.1.0
          - mc1.21.11-v1.1.0
          - mc1.21.10-v1.1.0
          - mc1.21.8-v1.1.0
          - mc1.21.1-v1.1.0
          - mc1.20.4-v1.1.0
          - mc1.20.1-v1.1.0
          - mc1.21.10-v1.0.1
          - mc1.20.4-v1.0.1
          - mc1.20.1-v1.0.1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Parse release info
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Extract MC version: mc1.21.10-v1.0.0 -> 1.21.10
          MC=$(echo "$TAG" | sed -E 's/^mc([0-9.]+)-v.*/\1/')

          # Map to CurseForge-recognized MC version
          case "$MC" in
            "1.21.10") CF_MC="1.21.1" ;;
            "26.1") CF_MC="26.1.1" ;;
            *) CF_MC="$MC" ;;
          esac
          echo "mc_version=$CF_MC" >> "$GITHUB_OUTPUT"

          # Determine mod loader
          case "$MC" in
            "1.20.1") echo "loader=forge" >> "$GITHUB_OUTPUT" ;;
            *) echo "loader=neoforge" >> "$GITHUB_OUTPUT" ;;
          esac

          # Mod version: mc1.21.10-v1.0.0 -> 1.0.0
          MOD_VER=$(echo "$TAG" | sed -E 's/^mc[0-9.]+-v//')
          echo "mod_version=$MOD_VER" >> "$GITHUB_OUTPUT"

          echo "Resolved: tag=$TAG mc=$CF_MC mod=$MOD_VER"

      - name: Download JAR from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "SecurityGolemAddon-*.jar" \
            --dir .
          echo "Downloaded:"
          ls -la SecurityGolemAddon-*.jar

      - name: Upload to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: SecurityGolemAddon-*.jar
          version: ${{ steps.meta.outputs.mod_version }}
          version-type: release
          game-versions: ${{ steps.meta.outputs.mc_version }}
          loaders: ${{ steps.meta.outputs.loader }}
          name: "SCGuardGolem v${{ steps.meta.outputs.mod_version }} [MC ${{ steps.meta.outputs.mc_version }}]"
          changelog: "Initial release. Features: Security Guard Golem, patrol system, threat modes (WARN/FOLLOW/ATTACK), upgrades, player lists, in-game manual, /scgolem commands."
