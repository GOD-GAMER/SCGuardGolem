name: Release & Publish

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine branch from release target
        id: meta
        run: |
          BRANCH="${{ github.event.release.target_commitish }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if [[ "$BRANCH" == *"1.21"* ]]; then
            echo "java=21" >> "$GITHUB_OUTPUT"
          else
            echo "java=17" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.meta.outputs.java }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build --no-daemon

      - name: Upload JAR to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(ls build/libs/SecurityGolemAddon-*.jar | head -1)
          gh release upload "${{ github.event.release.tag_name }}" "$JAR" --clobber

      - name: Publish to CurseForge
        if: vars.CURSEFORGE_PROJECT_ID != '' && secrets.CURSEFORGE_TOKEN != ''
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: ./gradlew curseforge -PcurseforgeProjectId=${{ vars.CURSEFORGE_PROJECT_ID }} --no-daemon
