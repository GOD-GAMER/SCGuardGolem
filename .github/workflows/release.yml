name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build (e.g. mc/1.21.10)"
        required: true
        type: choice
        options:
          - mc/1.21.10
          - mc/1.20.4
          - mc/1.20.1
      release_tag:
        description: "Existing release tag to attach JAR to (e.g. mc1.21.10-v1.0.0)"
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine branch and Java version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            BRANCH="${{ github.event.release.target_commitish }}"
            TAG="${{ github.event.release.tag_name }}"
          else
            BRANCH="${{ inputs.branch }}"
            TAG="${{ inputs.release_tag }}"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$BRANCH" == *"1.21"* ]]; then
            echo "java=21" >> "$GITHUB_OUTPUT"
          else
            echo "java=17" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.meta.outputs.java }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Debug - list workspace files
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Top-level files ==="
          ls -la
          echo "=== Gradle files ==="
          ls -la *.gradle* 2>/dev/null || echo "No .gradle files found"
          ls -la gradle/wrapper/ 2>/dev/null || echo "No wrapper dir"

      - name: Build JAR
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JAR to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(ls build/libs/SecurityGolemAddon-*.jar | head -1)
          gh release upload "${{ steps.meta.outputs.tag }}" "$JAR" --clobber

      - name: Publish to CurseForge
        if: ${{ vars.CURSEFORGE_PROJECT_ID != '' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: ./gradlew curseforge -PcurseforgeProjectId=${{ vars.CURSEFORGE_PROJECT_ID }} --no-daemon
